# Python test suite for the imaihda repository.
#
# R (testthat) is intentionally NOT run here: the R suites are validated by
# line-by-line parity with the tested Python implementations (see
# docs/VERSION_3.1_QC_REPORT.md and the PR history), and the repository has
# no reproducible R toolchain configuration to pin. Adding an R job is
# tracked as future work.
name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: python/requirements.txt
      - name: Install dependencies
        run: pip install -r python/requirements.txt
      - name: Run test suite
        working-directory: python
        run: python -m pytest -q
